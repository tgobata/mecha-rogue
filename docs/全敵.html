    * { box-sizing: border-box; margin: 0; padding: 0; }

      color: #e0e0e0;

    header {
      background: #16213e;
      border-bottom: 2px solid #2a2a5e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header a { color: #7ecfff; text-decoration: none; font-size: 0.85rem; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.2rem; color: #7ecfff; }
    #stats { font-size: 0.8rem; color: #888; margin-left: auto; }

    .filters {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 0.8rem; color: #aaa; white-space: nowrap; }
    .filters input, .filters select {
      background: #1a1a2e;
      border: 1px solid #3a3a6e;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.82rem;
    }
    .filters input[type="number"] { width: 70px; }
    .filters input[type="text"] { width: 140px; }
    .btn-reset {
      background: #2a2a5e;
      border: 1px solid #3a3a6e;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-reset:hover { background: #3a3a7e; color: #e0e0e0; }

    .table-wrap {
      overflow-x: auto;
      padding: 16px 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    thead th {
      background: #0f3460;
      color: #7ecfff;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-bottom: 2px solid #2a2a5e;
      position: sticky;
      top: 0;
    }
    thead th:hover { background: #1a4a80; }
    thead th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 0.7rem; }
    thead th.sorted .sort-icon { opacity: 1; }
    tbody tr {
      border-bottom: 1px solid #1e1e3e;
      transition: background 0.1s;
    }
    tbody tr:hover { background: #1e1e3e; }
    tbody tr.hidden { display: none; }
    td { padding: 8px 8px; vertical-align: middle; }
    td.id-cell { color: #888; font-family: monospace; font-size: 0.75rem; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.name-cell { font-weight: 500; white-space: nowrap; }
    td.desc-cell { color: #aaa; font-size: 0.78rem; max-width: 280px; line-height: 1.4; }
    td.num-cell { text-align: right; font-family: monospace; color: #c8d8ff; }
    td.floor-cell { text-align: center; font-family: monospace; color: #88ccaa; font-size: 0.78rem; }
    td.ai-cell { font-size: 0.75rem; color: #ccaa88; }
    td.equip-cell { font-size: 0.75rem; color: #cc88cc; }
    td.drop-cell { font-size: 0.75rem; color: #88aacc; }

    .level-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 0.8rem;
      color: #fff;
    }
    .faction-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.75rem;
      background: #2a2a5e;
      color: #aac0ff;
    }
    .hostile-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      background: #5e0a0a;
      color: #ff8888;
      margin-left: 4px;
    }

    .sprite-cell {
      width: 52px;
      text-align: center;
    }
    .sprite-wrap {
      width: 48px;
      height: 48px;
      background: #2a2a5e;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      margin: 0 auto;
      position: relative;
      cursor: pointer;
    }
    .sprite-main {
      image-rendering: pixelated;
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .sprite-wrap .no-sprite {
      width: 32px;
      height: 32px;
      background: #3a3a6e;
      border-radius: 4px;
    }
    /* ホバー時スプライト全状態ポップアップ */
    .sprite-states {
      display: none;
      position: absolute;
      left: 52px;
      top: 0;
      background: #16213e;
      border: 1px solid #3a3a8e;
      border-radius: 8px;
      padding: 8px;
      z-index: 200;
      flex-wrap: wrap;
      gap: 6px;
      width: 320px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .sprite-wrap:hover .sprite-states {
      display: flex;
    }
    .spr-thumb {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .spr-thumb img {
      image-rendering: pixelated;
      width: 32px;
      height: 32px;
      background: #2a2a5e;
      border-radius: 4px;
      border: 1px solid #3a3a6e;
    }
    .spr-thumb span {
      font-size: 0.6rem;
      color: #aaa;
      white-space: nowrap;
    }
    /* 装備バッジ */
    .eq-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .eq-w { background: #3a2200; color: #ffbb44; border: 1px solid #664400; }
    .eq-a { background: #002233; color: #44bbff; border: 1px solid #005566; }
    .eq-s { background: #003322; color: #44ffaa; border: 1px solid #006644; }

    #loading {
      text-align: center;
      padding: 60px;
      color: #888;
    }
    #error {
      text-align: center;
      padding: 60px;
      color: #ff6666;
      display: none;
    }

      padding: 40px;
      color: #888;

<body>
  <header>
    <a href="index.html">&#x2190; ドキュメント一覧</a>
    <h1>全敵一覧</h1>
    <span id="stats"></span>
  </header>

  <div class="filters">
    <div class="filter-group">
      <label>名前 / ID</label>
      <input type="text" id="filter-name" placeholder="検索...">
    </div>
    <div class="filter-group">
      <label>レベル</label>
      <select id="filter-level">
        <option value="">全て</option>
        <option value="1">Lv.1</option>
        <option value="2">Lv.2</option>
        <option value="3">Lv.3</option>
        <option value="4">Lv.4</option>
        <option value="5">Lv.5</option>
      </select>
    </div>
    <div class="filter-group">
      <label>派閥</label>
      <select id="filter-faction">
        <option value="">全て</option>
        <option value="neutral">neutral</option>
        <option value="machine">machine</option>
        <option value="organic">organic</option>
        <option value="undead">undead</option>
        <option value="elemental">elemental</option>
        <option value="boss">boss</option>
      </select>
    </div>
    <div class="filter-group">
      <label>出現階</label>
      <input type="number" id="filter-floor" placeholder="例: 5" min="1">
    </div>
    <div class="filter-group">
      <label>ベースID</label>
      <input type="text" id="filter-base" placeholder="例: scout_drone">
    </div>
    <div class="filter-group">
      <label>
        <input type="checkbox" id="filter-hostile"> 敵VS敵のみ
      </label>
    </div>
    <button class="btn-reset" id="btn-reset">リセット</button>
  </div>

  <div id="loading">データを読み込み中...</div>
  <div id="error">enemies.json の読み込みに失敗しました。</div>
  <div id="no-results">条件に一致する敵がいません。</div>

  <div class="table-wrap" id="table-container" style="display:none">
    <table id="enemy-table">
      <thead>
        <tr>
          <th class="sprite-col" style="cursor:default">スプライト</th>
          <th data-sort="id">ID <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="name">名前 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="level">Lv <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="hp">HP <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="atk">ATK <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="def">DEF <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="speed">SPD <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="attackRange">攻撃範囲 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="appearsFrom">出現階 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="factionType">派閥 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="movementPattern">AI <span class="sort-icon">&#x25B2;</span></th>
          <th>装備</th>
          <th data-sort="equipDropChance">ドロップ率 <span class="sort-icon">&#x25B2;</span></th>
          <th>説明</th>
        </tr>
      </thead>
      <tbody id="enemy-tbody"></tbody>
    </table>
  </div>

  <script>
    const LEVEL_COLORS = {
      1: '#888888',
      2: '#44aa44',
      3: '#4444cc',
      4: '#aa4400',
      5: '#cc0000'
    };

    const FACTION_LABEL = {
      neutral: 'ニュートラル',
      machine: 'マシン',
      organic: '有機体',
      undead: 'アンデッド',
      elemental: 'エレメンタル',
      boss: 'ボス'
    };

    let allEnemies = [];
    let sortKey = '';
    let sortAsc = true;

    // スプライト状態定義: [state, direction, frame, ラベル]
    const SPRITE_PREVIEWS = [
      ['idle',   'down',  0, '↓待機'],
      ['idle',   'up',    0, '↑待機'],
      ['idle',   'left',  0, '←待機'],
      ['idle',   'right', 0, '→待機'],
      ['attack', 'down',  1, '↓攻撃'],
      ['attack', 'right', 1, '→攻撃'],
      ['hit',    'down',  0, '被弾'],
      ['levelup','down',  0, 'Lvup'],
      ['dead',   'down',  1, '死亡'],
    ];

    function spriteUrl(id, state='idle', dir='down', frame=0) {
      return `../public/sprites/enemies/${id}_${state}_dir_${dir}_idle_${frame}.png`;
    }

    function renderSprite(id, baseId) {
      // メイン表示: idle down
      // フォールバック順: lv別フル形式 → lv別シンプル形式 → baseId形式
      const mainUrl  = spriteUrl(id);
      const fallback1 = `../public/sprites/enemies/${id}_dir_down_idle_0.png`;
      const fallback2 = baseId ? `../public/sprites/enemies/${baseId}_dir_down_idle_0.png` : '';
      const onerrorChain = fallback2
        ? `this.onerror=null;this.src='${fallback1}';this.onerror=function(){this.onerror=null;this.src='${fallback2}';this.onerror=function(){this.style.display='none';var ns=this.parentNode.querySelector('.no-sprite');if(ns)ns.style.display='flex';}};`
        : `this.onerror=null;this.src='${fallback1}';this.onerror=function(){this.style.display='none';var ns=this.parentNode.querySelector('.no-sprite');if(ns)ns.style.display='flex';};`;
      // ホバー時に全状態を展開するサムネイルグリッド
      const thumbs = SPRITE_PREVIEWS.map(([st, dir, fr, label]) => {
        const u = spriteUrl(id, st, dir, fr);
        return `<div class="spr-thumb" title="${label}">
          <img src="${u}" onerror="this.style.visibility='hidden'" alt="${label}">
          <span>${label}</span>
        </div>`;
      }).join('');
      return `<div class="sprite-wrap" title="ホバーで全状態表示">
        <img class="sprite-main" src="${mainUrl}"
          onerror="${onerrorChain}"
          alt="${id}">
        <div class="no-sprite" style="display:none"></div>
        <div class="sprite-states">${thumbs}</div>
      </div>`;
    }

    function equipText(e) {
      const parts = [];
      if (e.equippedWeapon) parts.push(`<span class="eq-badge eq-w" title="武器">⚔ ${e.equippedWeapon}</span>`);
      if (e.equippedArmor)  parts.push(`<span class="eq-badge eq-a" title="防具">🛡 ${e.equippedArmor}</span>`);
      if (e.equippedShield) parts.push(`<span class="eq-badge eq-s" title="盾">🔰 ${e.equippedShield}</span>`);
      return parts.length ? parts.join('<br>') : '<span style="color:#555">-</span>';
    }

    function renderRow(e) {
      const lvColor = LEVEL_COLORS[e.level] || '#888';
      const hostileBadge = e.canAttackAllies
        ? '<span class="hostile-badge">&#x26A0; 敵VS敵</span>' : '';
      return `<tr data-level="${e.level}" data-faction="${e.factionType||''}" data-floor-from="${e.appearsFrom||0}" data-floor-until="${e.appearsUntil||99}" data-base="${e.baseEnemyId||''}" data-hostile="${e.canAttackAllies?1:0}">
        <td class="sprite-cell">${renderSprite(e.id, e.baseEnemyId)}</td>
        <td class="id-cell" title="${e.id}">${e.id}</td>
        <td class="name-cell">${e.name}${hostileBadge}</td>
        <td><span class="level-badge" style="background:${lvColor}">Lv.${e.level}</span></td>
        <td class="num-cell">${e.hp}</td>
        <td class="num-cell">${e.atk}</td>
        <td class="num-cell">${e.def}</td>
        <td class="num-cell">${e.speed}</td>
        <td class="num-cell">${e.attackRange}</td>
        <td class="floor-cell">${e.appearsFrom || '?'} - ${e.appearsUntil || '?'}</td>
        <td><span class="faction-badge">${FACTION_LABEL[e.factionType] || e.factionType || '-'}</span></td>
        <td class="ai-cell">${e.movementPattern || '-'}</td>
        <td class="equip-cell">${equipText(e)}</td>
        <td class="drop-cell">${e.equipDropChance ? (e.equipDropChance * 100).toFixed(0) + '%' : '-'}</td>
        <td class="desc-cell">${e.description || ''}</td>
      </tr>`;
    }

    function applyFilters() {
      const nameQ = document.getElementById('filter-name').value.toLowerCase();
      const levelQ = document.getElementById('filter-level').value;
      const factionQ = document.getElementById('filter-faction').value;
      const floorQ = parseInt(document.getElementById('filter-floor').value) || null;
      const baseQ = document.getElementById('filter-base').value.toLowerCase();
      const hostileQ = document.getElementById('filter-hostile').checked;

      let visible = 0;
      document.querySelectorAll('#enemy-tbody tr').forEach(tr => {
        const level = tr.dataset.level;
        const faction = tr.dataset.faction;
        const floorFrom = parseInt(tr.dataset.floorFrom);
        const floorUntil = parseInt(tr.dataset.floorUntil);
        const base = tr.dataset.base;
        const hostile = tr.dataset.hostile === '1';

        let show = true;
        if (nameQ) {
          const idCell = tr.querySelector('.id-cell')?.textContent.toLowerCase() || '';
          const nameCell = tr.querySelector('.name-cell')?.textContent.toLowerCase() || '';
          if (!idCell.includes(nameQ) && !nameCell.includes(nameQ)) show = false;
        }
        if (levelQ && level !== levelQ) show = false;
        if (factionQ && faction !== factionQ) show = false;
        if (floorQ !== null) {
          if (floorFrom > floorQ || floorUntil < floorQ) show = false;
        }
        if (baseQ && !base.includes(baseQ)) show = false;
        if (hostileQ && !hostile) show = false;

        tr.classList.toggle('hidden', !show);
        if (show) visible++;
      });

      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      document.getElementById('stats').textContent = `表示: ${visible} / ${allEnemies.length} 体`;
    }

    function sortTable(key) {
      if (sortKey === key) {
        sortAsc = !sortAsc;
      } else {
        sortKey = key;
        sortAsc = true;
      }

      document.querySelectorAll('thead th').forEach(th => {
        th.classList.remove('sorted');
        const icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = '\u25B2';
      });

      const activeTh = document.querySelector(`thead th[data-sort="${key}"]`);
      if (activeTh) {
        activeTh.classList.add('sorted');
        const icon = activeTh.querySelector('.sort-icon');
        if (icon) icon.textContent = sortAsc ? '\u25B2' : '\u25BC';
      }

      const tbody = document.getElementById('enemy-tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const aE = allEnemies.find(e => e.id === a.querySelector('.id-cell')?.title);
        const bE = allEnemies.find(e => e.id === b.querySelector('.id-cell')?.title);
        if (!aE || !bE) return 0;
        let av = aE[key];
        let bv = bE[key];
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
        av = av ?? '';
        bv = bv ?? '';
        if (av < bv) return sortAsc ? -1 : 1;
        if (av > bv) return sortAsc ? 1 : -1;
        return 0;
      });
      rows.forEach(r => tbody.appendChild(r));
    }

    function init() {
      allEnemies = ENEMIES_DATA;

      const tbody = document.getElementById('enemy-tbody');
      tbody.innerHTML = allEnemies.map(renderRow).join('');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('table-container').style.display = 'block';
      document.getElementById('stats').textContent = `表示: ${allEnemies.length} / ${allEnemies.length} 体`;

      // Filter events
      ['filter-name', 'filter-level', 'filter-faction', 'filter-floor', 'filter-base'].forEach(id => {
        document.getElementById(id).addEventListener('input', applyFilters);
      });
      document.getElementById('filter-hostile').addEventListener('change', applyFilters);

      document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('filter-name').value = '';
        document.getElementById('filter-level').value = '';
        document.getElementById('filter-faction').value = '';
        document.getElementById('filter-floor').value = '';
        document.getElementById('filter-base').value = '';
        document.getElementById('filter-hostile').checked = false;
        applyFilters();
      });

      // Sort events
      document.querySelectorAll('thead th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          sortTable(th.dataset.sort);
          applyFilters();
        });
      });

      // Populate faction filter from actual data
      const factions = [...new Set(allEnemies.map(e => e.factionType).filter(Boolean))].sort();
      const sel = document.getElementById('filter-faction');
      sel.innerHTML = '<option value="">全て</option>';
      factions.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = (FACTION_LABEL[f] || f) + ' (' + f + ')';
        sel.appendChild(opt);
      });
    }

    init();
  </script>
</body>
</html>
