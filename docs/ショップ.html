<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ショップ価格表 - メカローグ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      border-bottom: 2px solid #2a2a5e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header a { color: #7ecfff; text-decoration: none; font-size: 0.85rem; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.2rem; color: #ffcc88; }
    #stats { font-size: 0.8rem; color: #888; margin-left: auto; }

    .tabs {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      display: flex;
      gap: 0;
      padding: 0 24px;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #ffcc88; border-bottom-color: #ffcc88; }
    .tab-badge {
      display: inline-block;
      background: #2a2a5e;
      color: #aaa;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.72rem;
      margin-left: 6px;
    }

    .filters {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 0.8rem; color: #aaa; white-space: nowrap; }
    .filters input, .filters select {
      background: #1a1a2e;
      border: 1px solid #3a3a6e;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.82rem;
    }
    .filters input[type="text"] { width: 160px; }
    .btn-reset {
      background: #2a2a5e;
      border: 1px solid #3a3a6e;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-reset:hover { background: #3a3a7e; color: #e0e0e0; }

    .table-wrap {
      overflow-x: auto;
      padding: 16px 24px;
      display: none;
    }
    .table-wrap.active { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    thead th {
      background: #0f3460;
      color: #7ecfff;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-bottom: 2px solid #2a2a5e;
    }
    thead th:hover { background: #1a4a80; }
    thead th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 0.7rem; }
    thead th.sorted .sort-icon { opacity: 1; }
    thead th.no-sort { cursor: default; }
    thead th.no-sort:hover { background: #0f3460; }
    tbody tr { border-bottom: 1px solid #1e1e3e; transition: background 0.1s; }
    tbody tr:hover { background: #1e1e3e; }
    tbody tr.hidden { display: none; }
    tbody tr.not-for-sale td { opacity: 0.5; }
    td { padding: 8px 8px; vertical-align: middle; }
    td.id-cell { color: #888; font-family: monospace; font-size: 0.75rem; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.name-cell { font-weight: 500; white-space: nowrap; }
    td.buy-cell  { text-align: right; font-family: monospace; color: #ffcc88; }
    td.sell-cell { text-align: right; font-family: monospace; color: #88ffcc; }
    td.num-cell  { text-align: right; font-family: monospace; color: #c8d8ff; }
    td.desc-cell { color: #aaa; font-size: 0.78rem; max-width: 280px; line-height: 1.4; }

    .cat-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.73rem;
      background: #1a3e4e;
      color: #88ccff;
    }
    .cat-melee   { background: #3a1e1e; color: #ff8888; }
    .cat-ranged  { background: #1e2a3e; color: #88aaff; }
    .cat-special { background: #1e3a1e; color: #88ff88; }
    .cat-shield  { background: #1e2e2e; color: #88ffcc; }
    .cat-armor   { background: #2e2e1e; color: #ffdd88; }

    .no-sale-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      background: #3a2a1e;
      color: #cc8844;
    }

    .info-box {
      background: #16213e;
      border: 1px solid #2a2a5e;
      border-radius: 8px;
      padding: 16px 20px;
      margin: 16px 24px;
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .info-box strong { color: #ffcc88; }
    .info-box .repair-cost { font-size: 1.1rem; color: #ffcc88; font-weight: bold; font-family: monospace; }

    #no-results { text-align: center; padding: 40px; color: #888; display: none; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">&#x2190; ドキュメント一覧</a>
    <h1>ショップ価格表</h1>
    <span id="stats"></span>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="weapons">武器 <span class="tab-badge" id="badge-weapons">-</span></div>
    <div class="tab" data-tab="items">アイテム <span class="tab-badge" id="badge-items">-</span></div>
    <div class="tab" data-tab="repair">修理コスト</div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>名前 / ID</label>
      <input type="text" id="filter-name" placeholder="検索...">
    </div>
    <div class="filter-group">
      <label>カテゴリ</label>
      <select id="filter-category">
        <option value="">全て</option>
      </select>
    </div>
    <div class="filter-group">
      <label>売買</label>
      <select id="filter-sale">
        <option value="">全て</option>
        <option value="buyable">ショップ購入可</option>
        <option value="sellonly">売却のみ</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">リセット</button>
  </div>

  <div id="no-results">条件に一致するアイテムがありません。</div>

  <!-- 武器タブ -->
  <div class="table-wrap active" id="tab-weapons">
    <table id="weapons-table">
      <thead>
        <tr>
          <th data-sort="id" data-table="weapons">ID <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="name" data-table="weapons">名前 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="category" data-table="weapons">種別 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="atk" data-table="weapons">ATK <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="range" data-table="weapons">射程 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="buy" data-table="weapons">買値 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="sell" data-table="weapons">売値 <span class="sort-icon">&#x25B2;</span></th>
          <th class="no-sort">説明</th>
        </tr>
      </thead>
      <tbody id="weapons-tbody"></tbody>
    </table>
  </div>

  <!-- アイテムタブ -->
  <div class="table-wrap" id="tab-items">
    <table id="items-table">
      <thead>
        <tr>
          <th data-sort="id" data-table="items">ID <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="name" data-table="items">名前 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="category" data-table="items">種別 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="buy" data-table="items">買値 <span class="sort-icon">&#x25B2;</span></th>
          <th data-sort="sell" data-table="items">売値 <span class="sort-icon">&#x25B2;</span></th>
          <th class="no-sort">説明</th>
        </tr>
      </thead>
      <tbody id="items-tbody"></tbody>
    </table>
  </div>

  <!-- 修理タブ -->
  <div class="table-wrap" id="tab-repair">
    <div class="info-box">
      <p><strong>武器修理コスト</strong></p>
      <p>耐久度1あたりの修理費用: <span class="repair-cost">15G</span></p>
      <p style="color:#aaa;font-size:0.82rem;margin-top:8px">
        修理費用 = 現在の耐久度不足量 × 15G<br>
        例: 最大耐久30の武器が耐久10の場合 → 修理費用 = (30 - 10) × 15 = 300G
      </p>
    </div>
    <div class="info-box" style="margin-top:0">
      <p><strong>ショップ仕入れ数（constants.ts 設定値）</strong></p>
      <p style="color:#aaa;font-size:0.82rem;margin-top:6px">
        武器: <span style="color:#ffcc88">3〜5点</span><br>
        アイテム: <span style="color:#ffcc88">3〜4点</span>
      </p>
    </div>
  </div>

    let currentTab = 'weapons';
    let sortStates = { weapons: { key: '', asc: true }, items: { key: '', asc: true } };

    // データを価格情報と結合して拡張する
    function mergeWeapons() {
      return WEAPONS_DATA.map(w => {
        const price = SHOP_PRICES.weapons[w.id] || { buy: 0, sell: 0 };
        return Object.assign({}, w, { buy: price.buy, sell: price.sell });
      });
    }

    function mergeItems() {
      return ITEMS_DATA.map(it => {
        const price = SHOP_PRICES.items[it.id] || { buy: it.shopPrice || 0, sell: 0 };
        return Object.assign({}, it, { buy: price.buy, sell: price.sell });
      });
    }

    const allWeapons = mergeWeapons();
    const allItems   = mergeItems();

    function catBadgeClass(cat) {
      const map = { melee: 'cat-melee', ranged: 'cat-ranged', special: 'cat-special', shield: 'cat-shield', armor: 'cat-armor' };
      return map[cat] || '';
    }

    function buyLabel(buy) {
      if (buy === 0) return '<span class="no-sale-badge">非売品</span>';
      return buy.toLocaleString() + 'G';
    }

    function renderWeaponRow(w) {
      const notForSale = w.buy === 0 && w.sell === 0;
      const cls = notForSale ? ' class="not-for-sale"' : '';
      const durVal = w.durability === null ? '&#x221E;' : (w.durability !== undefined ? w.durability : '-');
      return `<tr${cls} data-id="${w.id}" data-name="${w.name}" data-category="${w.category||''}" data-buy="${w.buy}" data-sell="${w.sell}">
        <td class="id-cell" title="${w.id}">${w.id}</td>
        <td class="name-cell">${w.name}</td>
        <td><span class="cat-badge ${catBadgeClass(w.category)}">${w.category || '-'}</span></td>
        <td class="num-cell" style="color:#ff9999">${w.atk !== undefined && w.atk > 0 ? w.atk : '-'}</td>
        <td class="num-cell">${w.range > 0 ? w.range : '-'}</td>
        <td class="buy-cell">${buyLabel(w.buy)}</td>
        <td class="sell-cell">${w.sell > 0 ? w.sell.toLocaleString() + 'G' : '-'}</td>
        <td class="desc-cell">${w.description || ''}</td>
      </tr>`;
    }

    function renderItemRow(it) {
      const notForSale = it.buy === 0;
      const cls = notForSale ? ' class="not-for-sale"' : '';
      return `<tr${cls} data-id="${it.id}" data-name="${it.name}" data-category="${it.category||''}" data-buy="${it.buy}" data-sell="${it.sell}">
        <td class="id-cell" title="${it.id}">${it.id}</td>
        <td class="name-cell">${it.name}</td>
        <td><span class="cat-badge">${it.category || '-'}</span></td>
        <td class="buy-cell">${buyLabel(it.buy)}</td>
        <td class="sell-cell">${it.sell > 0 ? it.sell.toLocaleString() + 'G' : '-'}</td>
        <td class="desc-cell">${it.description || ''}</td>
      </tr>`;
    }

    function getCurrentData() {
      return { weapons: allWeapons, items: allItems }[currentTab];
    }

    function applyFilters() {
      if (currentTab === 'repair') {
        document.getElementById('stats').textContent = '';
        return;
      }
      const nameQ = document.getElementById('filter-name').value.toLowerCase();
      const catQ  = document.getElementById('filter-category').value;
      const saleQ = document.getElementById('filter-sale').value;

      const tbodyId = currentTab + '-tbody';
      const rows = document.querySelectorAll(`#${tbodyId} tr`);
      let visible = 0;
      rows.forEach(tr => {
        const id   = (tr.dataset.id || '').toLowerCase();
        const name = (tr.dataset.name || '').toLowerCase();
        const cat  = tr.dataset.category || '';
        const buy  = parseInt(tr.dataset.buy) || 0;

        let show = true;
        if (nameQ && !id.includes(nameQ) && !name.includes(nameQ)) show = false;
        if (catQ && cat !== catQ) show = false;
        if (saleQ === 'buyable' && buy === 0) show = false;
        if (saleQ === 'sellonly' && buy > 0) show = false;

        tr.classList.toggle('hidden', !show);
        if (show) visible++;
      });

      const total = getCurrentData().length;
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      document.getElementById('stats').textContent = `表示: ${visible} / ${total} 件`;
    }

    function updateCategoryFilter() {
      if (currentTab === 'repair') {
        document.getElementById('filter-category').innerHTML = '<option value="">全て</option>';
        return;
      }
      const data = getCurrentData();
      const cats = [...new Set(data.map(d => d.category).filter(Boolean))].sort();
      const sel = document.getElementById('filter-category');
      const prev = sel.value;
      sel.innerHTML = '<option value="">全て</option>';
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
      });
      if (cats.includes(prev)) sel.value = prev;
    }

    function sortTable(tableKey, key) {
      if (tableKey === 'repair') return;
      const state = sortStates[tableKey];
      if (state.key === key) state.asc = !state.asc;
      else { state.key = key; state.asc = true; }

      document.querySelectorAll(`#tab-${tableKey} thead th`).forEach(th => {
        th.classList.remove('sorted');
        const icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = '\u25B2';
      });
      const activeTh = document.querySelector(`#tab-${tableKey} thead th[data-sort="${key}"]`);
      if (activeTh) {
        activeTh.classList.add('sorted');
        const icon = activeTh.querySelector('.sort-icon');
        if (icon) icon.textContent = state.asc ? '\u25B2' : '\u25BC';
      }

      const data = { weapons: allWeapons, items: allItems }[tableKey];
      const tbodyId = tableKey + '-tbody';
      const tbody = document.getElementById(tbodyId);
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const aD = data.find(d => d.id === a.querySelector('.id-cell')?.title);
        const bD = data.find(d => d.id === b.querySelector('.id-cell')?.title);
        if (!aD || !bD) return 0;
        let av = aD[key], bv = bD[key];
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
        av = av ?? -Infinity;
        bv = bv ?? -Infinity;
        if (av < bv) return state.asc ? -1 : 1;
        if (av > bv) return state.asc ? 1 : -1;
        return 0;
      });
      rows.forEach(r => tbody.appendChild(r));
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('.table-wrap').forEach(w => w.classList.toggle('active', w.id === 'tab-' + tab));
      updateCategoryFilter();
      applyFilters();
    }

    // 初期化
    (function init() {
      document.getElementById('weapons-tbody').innerHTML = allWeapons.map(renderWeaponRow).join('');
      document.getElementById('items-tbody').innerHTML   = allItems.map(renderItemRow).join('');

      document.getElementById('badge-weapons').textContent = allWeapons.length;
      document.getElementById('badge-items').textContent   = allItems.length;

      updateCategoryFilter();
      applyFilters();

      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => switchTab(t.dataset.tab));
      });

      ['filter-name', 'filter-category', 'filter-sale'].forEach(id => {
        document.getElementById(id).addEventListener('input', applyFilters);
      });

      document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('filter-name').value     = '';
        document.getElementById('filter-category').value = '';
        document.getElementById('filter-sale').value     = '';
        applyFilters();
      });

      document.querySelectorAll('thead th[data-sort][data-table]').forEach(th => {
        th.addEventListener('click', () => {
          sortTable(th.dataset.table, th.dataset.sort);
          applyFilters();
        });
      });
    })();
  </script>
