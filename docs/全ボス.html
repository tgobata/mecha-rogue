    * { box-sizing: border-box; margin: 0; padding: 0; }

      top: 0;
      z-index: 100;
    }
    header a { color: #7ecfff; text-decoration: none; font-size: 0.85rem; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.2rem; color: #ff8877; }
    #stats { font-size: 0.8rem; color: #888; margin-left: auto; }

    .filters {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      padding: 14px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 0.8rem; color: #aaa; }
    .filters input, .filters select {
      background: #1a1a2e;
      border: 1px solid #3a3a6e;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.82rem;
    }
    .filters input[type="text"] { width: 160px; }
    .btn-reset {
      background: #2a2a5e;
      border: 1px solid #3a3a6e;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-reset:hover { background: #3a3a7e; color: #e0e0e0; }

    .boss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    .boss-card {
      background: #16213e;
      border: 1px solid #2a2a5e;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .boss-card:hover { border-color: #ff8877; }
    .boss-card.hidden { display: none; }

    .boss-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }
    .boss-sprite {
      width: 64px;
      height: 64px;
      background: #2a2a5e;
      border-radius: 8px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .boss-sprite img {
      image-rendering: pixelated;
      width: 56px;
      height: 56px;
      object-fit: contain;
    }
    .boss-sprite .no-sprite {
      width: 40px;
      height: 40px;
      background: #3a3a6e;
      border-radius: 6px;
    }
    .boss-info { flex: 1; min-width: 0; }
    .boss-name {
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffcc88;
      margin-bottom: 4px;
    }
    .boss-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 6px;
    }
    .tier-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .tier-minor { background: #2a3a6e; color: #88aaff; }
    .tier-mid { background: #4a2a6e; color: #cc88ff; }
    .tier-major { background: #6e2a2a; color: #ff8888; }
    .tier-final { background: #6e4a00; color: #ffcc44; }
    .floor-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      background: #1a3e2a;
      color: #88ffaa;
    }
    .boss-id { font-family: monospace; font-size: 0.7rem; color: #666; }

    .boss-stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .stat-item {
      background: #1a1a2e;
      border: 1px solid #2a2a5e;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      text-align: center;
    }
    .stat-label { color: #888; font-size: 0.7rem; display: block; }
    .stat-val { color: #c8d8ff; font-weight: bold; font-family: monospace; }

    .boss-section {
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .section-content {
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .special-tag {
      display: inline-block;
      background: #3a1a5e;
      color: #cc88ff;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.75rem;
    }
    .weakness-text { color: #ffaa44; }
    .hint-text { color: #aaccaa; font-style: italic; }
    .desc-text { color: #ccc; }

    .phases-list { list-style: none; }
    .phase-item {

      border: 1px solid #2a2a5e;
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 4px;
      font-size: 0.8rem;
    }
    .phase-num { color: #7ecfff; font-weight: bold; margin-right: 6px; }

    #loading { text-align: center; padding: 60px; color: #888; }
    #error { text-align: center; padding: 60px; color: #ff6666; display: none; }
    #no-results { text-align: center; padding: 40px; color: #888; display: none; }

<body>
  <header>
    <a href="index.html">&#x2190; ドキュメント一覧</a>
    <h1>全ボス一覧</h1>
    <span id="stats"></span>
  </header>

  <div class="filters">
    <div class="filter-group">
      <label>名前 / ID</label>
      <input type="text" id="filter-name" placeholder="検索...">
    </div>
    <div class="filter-group">
      <label>ティア</label>
      <select id="filter-tier">
        <option value="">全て</option>
        <option value="minor">minor</option>
        <option value="mid">mid</option>
        <option value="major">major</option>
        <option value="final">final</option>
      </select>
    </div>
    <button class="btn-reset" id="btn-reset">リセット</button>
  </div>

  <div id="loading">データを読み込み中...</div>
  <div id="error"></div>
  <div id="no-results">条件に一致するボスがいません。</div>
  <div class="boss-grid" id="boss-grid"></div>

  <script>
    const TIER_CLASS = {
      minor: 'tier-minor',
      mid: 'tier-mid',
      major: 'tier-major',
      final: 'tier-final'
    };
    const TIER_LABEL = {
      minor: 'マイナー',
      mid: 'ミッド',
      major: 'メジャー',
      final: 'ファイナル'
    };

    let allBosses = [];

    function spriteUrl(id) {
      return `../public/sprites/enemies/${id}_move_dir_down_idle_0.png`;
    }

    function renderExtra(b) {
      const rows = [];
      const skip = new Set(['id','name','floor','tier','hp','atk','def','expReward','goldReward','special','weakness','hint','description','phases','size']);
      for (const [k, v] of Object.entries(b)) {
        if (skip.has(k)) continue;
        if (v === null || v === undefined) continue;
        rows.push(`<span style="color:#888">${k}:</span> <span style="color:#c8d8ff;font-family:monospace">${JSON.stringify(v)}</span>`);
      }
      return rows.join(' &nbsp;|&nbsp; ');
    }

    function renderPhases(phases) {
      if (!phases || !phases.length) return '';
      return `<ul class="phases-list">${phases.map(p => `
        <li class="phase-item">
          <span class="phase-num">フェーズ${p.phase}</span>
          HP: ${Math.round(p.hpRange[1]*100)}% - ${Math.round(p.hpRange[0]*100)}%
          &nbsp; 能力: <span class="special-tag">${p.ability}</span>
          ${p.cloneHp ? `&nbsp; クローンHP:${p.cloneHp} ATK:${p.cloneAtk}` : ''}
          ${p.playerViewRadius !== undefined ? `&nbsp; 視界半径:${p.playerViewRadius}` : ''}
          ${p.atkMult !== undefined ? `&nbsp; ATK倍率:${p.atkMult}x` : ''}
          ${p.def !== undefined && p.ability !== undefined && p.ability.includes('absorb') ? `&nbsp; DEF:${p.def}` : ''}
        </li>`).join('')}</ul>`;
    }

    function renderCard(b) {
      const tierClass = TIER_CLASS[b.tier] || 'tier-minor';
      const extraInfo = renderExtra(b);
      const phases = b.phases ? renderPhases(b.phases) : '';

      return `<div class="boss-card" data-id="${b.id}" data-name="${b.name}" data-tier="${b.tier}">
        <div class="boss-header">
          <div class="boss-sprite">
            <img src="${spriteUrl(b.id)}"
              onerror="this.onerror=null;this.src='../public/sprites/enemies/${b.id}_dir_down_idle_0.png';this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<div class=\\'no-sprite\\'></div>';}"
              alt="${b.id}">
          </div>
          <div class="boss-info">
            <div class="boss-name">${b.name}</div>
            <div class="boss-meta">
              <span class="tier-badge ${tierClass}">${TIER_LABEL[b.tier] || b.tier}</span>
              <span class="floor-badge">&#x1F3F0; ${b.floor}F</span>
            </div>
            <div class="boss-id">${b.id}</div>
          </div>
        </div>

        <div class="boss-stats">
          <div class="stat-item">
            <span class="stat-label">HP</span>
            <span class="stat-val">${b.hp}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">ATK</span>
            <span class="stat-val">${b.atk}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">DEF</span>
            <span class="stat-val">${b.def}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">EXP</span>
            <span class="stat-val">${b.expReward}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Gold</span>
            <span class="stat-val">${b.goldReward}</span>
          </div>
          ${b.size ? `<div class="stat-item">
            <span class="stat-label">サイズ</span>
            <span class="stat-val">${b.size}×${b.size}</span>
          </div>` : ''}
        </div>

        ${extraInfo ? `<div class="boss-section"><div class="section-title">特殊パラメータ</div><div class="section-content" style="font-size:0.75rem;color:#aaa">${extraInfo}</div></div>` : ''}

        <div class="boss-section">
          <div class="section-title">特殊能力</div>
          <div class="section-content"><span class="special-tag">${b.special || '-'}</span></div>
        </div>

        ${phases ? `<div class="boss-section"><div class="section-title">フェーズ</div>${phases}</div>` : ''}

        ${b.weakness ? `<div class="boss-section">
          <div class="section-title">弱点</div>
          <div class="section-content weakness-text">${b.weakness}</div>
        </div>` : ''}

        ${b.hint ? `<div class="boss-section">
          <div class="section-title">ヒント</div>
          <div class="section-content hint-text">「${b.hint}」</div>
        </div>` : ''}

        <div class="boss-section">
          <div class="section-title">説明</div>
          <div class="section-content desc-text">${b.description || ''}</div>
        </div>
      </div>`;
    }

    function applyFilters() {
      const nameQ = document.getElementById('filter-name').value.toLowerCase();
      const tierQ = document.getElementById('filter-tier').value;

      let visible = 0;
      document.querySelectorAll('.boss-card').forEach(card => {
        const id = card.dataset.id.toLowerCase();
        const name = card.dataset.name.toLowerCase();
        const tier = card.dataset.tier;

        let show = true;
        if (nameQ && !id.includes(nameQ) && !name.includes(nameQ)) show = false;
        if (tierQ && tier !== tierQ) show = false;

        card.classList.toggle('hidden', !show);
        if (show) visible++;
      });

      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      document.getElementById('stats').textContent = `表示: ${visible} / ${allBosses.length} 体`;
    }

    function init() {
      allBosses = BOSSES_DATA;

      const grid = document.getElementById('boss-grid');
      grid.innerHTML = allBosses.map(renderCard).join('');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('stats').textContent = `表示: ${allBosses.length} / ${allBosses.length} 体`;

      document.getElementById('filter-name').addEventListener('input', applyFilters);
      document.getElementById('filter-tier').addEventListener('change', applyFilters);
      document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('filter-name').value = '';
        document.getElementById('filter-tier').value = '';
        applyFilters();
      });
    }

    init();
  </script>
</body>
</html>
