<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全スプライト確認 - メカローグ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      border-bottom: 2px solid #2a2a5e;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header a { color: #7ecfff; text-decoration: none; font-size: 0.85rem; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.2rem; color: #ffcc88; }
    #stats { font-size: 0.8rem; color: #888; margin-left: auto; }

    .filters {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 0.8rem; color: #aaa; white-space: nowrap; }
    .filters input, .filters select {
      background: #1a1a2e;
      border: 1px solid #3a3a6e;
      color: #e0e0e0;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.82rem;
    }
    .filters input[type="text"] { width: 220px; }
    .btn-reset {
      background: #2a2a5e;
      border: 1px solid #3a3a6e;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-reset:hover { background: #3a3a7e; color: #e0e0e0; }

    .size-btns { display: flex; gap: 4px; }
    .size-btn {
      background: #2a2a5e;
      border: 1px solid #3a3a6e;
      color: #aaa;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
    }
    .size-btn.active { background: #1a4a80; color: #7ecfff; border-color: #7ecfff; }

    .section {
      padding: 20px 24px 0;
    }
    .section-title {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      padding-bottom: 4px;
      border-bottom: 1px solid #2a2a5e;
    }
    .section-title span { color: #aaa; margin-left: 8px; font-size: 0.8rem; }

    .sprite-grid {
      display: grid;
      gap: 8px;
      margin-bottom: 32px;
    }
    .sprite-grid.size-small { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
    .sprite-grid.size-medium { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .sprite-grid.size-large { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

    .sprite-item {
      background: #16213e;
      border: 1px solid #2a2a5e;
      border-radius: 8px;
      padding: 8px 6px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s;
      cursor: default;
    }
    .sprite-item:hover { border-color: #7ecfff; }
    .sprite-item.hidden { display: none; }

    .sprite-img-wrap {
      width: 52px;
      height: 52px;
      background: #1a1a2e;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .size-large .sprite-img-wrap {
      width: 80px;
      height: 80px;
    }
    .size-small .sprite-img-wrap {
      width: 40px;
      height: 40px;
    }
    .sprite-img-wrap img {
      image-rendering: pixelated;
      width: 48px;
      height: 48px;
      object-fit: contain;
    }
    .size-large .sprite-img-wrap img { width: 72px; height: 72px; }
    .size-small .sprite-img-wrap img { width: 36px; height: 36px; }

    .sprite-img-wrap .no-img {
      width: 32px;
      height: 32px;
      background: #3a3a6e;
      border-radius: 4px;
    }

    .sprite-name {
      font-size: 0.6rem;
      color: #888;
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .size-large .sprite-name { font-size: 0.7rem; }

    #loading { text-align: center; padding: 60px; color: #888; }
    #error { text-align: center; padding: 60px; color: #ff6666; display: none; }
    #no-results { text-align: center; padding: 40px; color: #888; display: none; }
    #content { display: none; padding-bottom: 40px; }

    /* Tooltip on hover */
    .sprite-item[title]:hover::after {
      content: attr(title);
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f3460;
      color: #7ecfff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-family: monospace;
      border: 1px solid #2a2a5e;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">&#x2190; ドキュメント一覧</a>
    <h1>全スプライト確認</h1>
    <span id="stats"></span>
  </header>

  <div class="filters">
    <div class="filter-group">
      <label>検索（ファイル名）</label>
      <input type="text" id="filter-name" placeholder="例: scout_drone, idle, atk...">
    </div>
    <div class="filter-group">
      <label>状態</label>
      <select id="filter-state">
        <option value="">全て</option>
        <option value="idle">idle</option>
        <option value="attack">attack / atk</option>
        <option value="hit">hit / dmg</option>
        <option value="dead">dead</option>
        <option value="move">move</option>
        <option value="levelup">levelup</option>
      </select>
    </div>
    <div class="filter-group">
      <label>グループ化</label>
      <select id="filter-group">
        <option value="enemy">敵ごと</option>
        <option value="none">グループなし</option>
      </select>
    </div>
    <div class="filter-group">
      <label>サイズ</label>
      <div class="size-btns">
        <button class="size-btn" data-size="small">小</button>
        <button class="size-btn active" data-size="medium">中</button>
        <button class="size-btn" data-size="large">大</button>
      </div>
    </div>
    <button class="btn-reset" id="btn-reset">リセット</button>
  </div>

  <div id="loading">データを読み込み中...</div>
  <div id="error"></div>
  <div id="no-results">条件に一致するスプライトがありません。</div>
  <div id="content"></div>

    const SPRITES_BASE = '../public/sprites/enemies/';
    let currentSize = 'medium';

    function getEnemyPrefix(filename) {
      // Extract enemy base name (remove state/direction/frame suffixes)
      const name = filename.replace('.png', '');
      // Remove trailing _N (frame number)
      let base = name.replace(/_\d+$/, '');
      // Remove trailing _dir_* patterns
      base = base.replace(/_dir_(down|up|left|right)_(idle|attack|hit|dead|move|levelup|atk|dmg)$/, '');
      base = base.replace(/_dir_(down|up|left|right)$/, '');
      // Remove state suffixes
      base = base.replace(/_(idle|attack|hit|dead|move|levelup|atk|dmg)$/, '');
      return base;
    }

    function stateOf(filename) {
      const f = filename.toLowerCase();
      if (f.includes('dead')) return 'dead';
      if (f.includes('attack') || f.includes('_atk')) return 'attack';
      if (f.includes('hit') || f.includes('_dmg')) return 'hit';
      if (f.includes('move')) return 'move';
      if (f.includes('levelup')) return 'levelup';
      return 'idle';
    }

    function matchesStateFilter(filename, stateQ) {
      if (!stateQ) return true;
      const state = stateOf(filename);
      if (stateQ === 'attack') return state === 'attack';
      if (stateQ === 'hit') return state === 'hit';
      return state === stateQ;
    }

    function renderItem(filename) {
      const url = SPRITES_BASE + filename;
      const shortName = filename.replace('.png', '');
      return `<div class="sprite-item" title="${filename}">
        <div class="sprite-img-wrap">
          <img src="${url}" alt="${filename}"
            onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\\'no-img\\'></div>'">
        </div>
        <div class="sprite-name">${shortName}</div>
      </div>`;
    }

    function render() {
      const nameQ = document.getElementById('filter-name').value.toLowerCase();
      const stateQ = document.getElementById('filter-state').value;
      const groupMode = document.getElementById('filter-group').value;

      const filtered = ALL_SPRITE_FILES.filter(f => {
        if (nameQ && !f.toLowerCase().includes(nameQ)) return false;
        if (!matchesStateFilter(f, stateQ)) return false;
        return true;
      });

      const content = document.getElementById('content');
      document.getElementById('no-results').style.display = filtered.length === 0 ? 'block' : 'none';

      if (filtered.length === 0) {
        content.innerHTML = '';
        document.getElementById('stats').textContent = `表示: 0 / ${ALL_SPRITE_FILES.length} 枚`;
        return;
      }

      if (groupMode === 'none') {
        content.innerHTML = `<div class="section">
          <div class="sprite-grid size-${currentSize}">${filtered.map(renderItem).join('')}</div>
        </div>`;
      } else {
        // Group by enemy prefix
        const groups = new Map();
        filtered.forEach(f => {
          const prefix = getEnemyPrefix(f);
          if (!groups.has(prefix)) groups.set(prefix, []);
          groups.get(prefix).push(f);
        });

        const sortedGroups = [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0]));
        content.innerHTML = sortedGroups.map(([prefix, files]) => `
          <div class="section">
            <div class="section-title">${prefix} <span>(${files.length} 枚)</span></div>
            <div class="sprite-grid size-${currentSize}">${files.map(renderItem).join('')}</div>
          </div>
        `).join('');
      }

      document.getElementById('stats').textContent = `表示: ${filtered.length} / ${ALL_SPRITE_FILES.length} 枚`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';

      render();

      document.getElementById('filter-name').addEventListener('input', render);
      document.getElementById('filter-state').addEventListener('change', render);
      document.getElementById('filter-group').addEventListener('change', render);

      document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('filter-name').value = '';
        document.getElementById('filter-state').value = '';
        document.getElementById('filter-group').value = 'enemy';
        render();
      });

      document.querySelectorAll('.size-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentSize = btn.dataset.size;
          document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b === btn));
          render();
        });
      });
    });
  </script>
</body>
