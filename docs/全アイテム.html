    #stats { font-size: 0.8rem; color: #888; margin-left: auto; }

      border-bottom: 1px solid #2a2a5e;
      display: flex;
      gap: 0;
      padding: 0 24px;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      border-bottom: 3px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tab:hover { color: #ccc; }
    .tab.active { color: #88ffcc; border-bottom-color: #88ffcc; }
    .tab-badge {
      display: inline-block;
      background: #2a2a5e;
      color: #aaa;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 0.72rem;
      margin-left: 6px;
    }

    .filters {
      background: #16213e;
      border-bottom: 1px solid #2a2a5e;
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label { font-size: 0.8rem; color: #aaa; white-space: nowrap; }
    .filters input, .filters select {
      background: #1a1a2e;
      border: 1px solid #3a3a6e;
      color: #e0e0e0;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.82rem;
    }
    .filters input[type="text"] { width: 160px; }
    .btn-reset {
      background: #2a2a5e;
      border: 1px solid #3a3a6e;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn-reset:hover { background: #3a3a7e; color: #e0e0e0; }

    .table-wrap {
      overflow-x: auto;
      padding: 16px 24px;
      display: none;
    }
    .table-wrap.active { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    thead th {
      background: #0f3460;
      color: #7ecfff;
      padding: 10px 8px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      border-bottom: 2px solid #2a2a5e;
    }
    thead th:hover { background: #1a4a80; }
    thead th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 0.7rem; }
    thead th.sorted .sort-icon { opacity: 1; }
    tbody tr { border-bottom: 1px solid #1e1e3e; transition: background 0.1s; }
    tbody tr:hover { background: #1e1e3e; }
    tbody tr.hidden { display: none; }
    td { padding: 8px 8px; vertical-align: middle; }
    td.id-cell { color: #888; font-family: monospace; font-size: 0.75rem; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    td.name-cell { font-weight: 500; white-space: nowrap; }
    td.num-cell { text-align: right; font-family: monospace; color: #c8d8ff; }
    td.price-cell { text-align: right; font-family: monospace; color: #ffcc88; }
    td.desc-cell { color: #aaa; font-size: 0.78rem; max-width: 300px; line-height: 1.4; }

    .cat-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.73rem;
      background: #1a3e4e;
      color: #88ccff;

  <script>
    let allItems = [], allWeapons = [], allTools = [];
    let currentTab = 'items';
    let sortStates = { items: { key: '', asc: true }, weapons: { key: '', asc: true }, tools: { key: '', asc: true } };

    function catBadgeClass(cat) {
      const map = { melee: 'cat-melee', ranged: 'cat-ranged', special: 'cat-special', shield: 'cat-shield', armor: 'cat-armor' };
      return map[cat] || '';
    }

    function renderItemRow(it) {
      return `<tr data-id="${it.id}" data-name="${it.name}" data-category="${it.category||''}" data-floor="${it.appearsFrom||0}">
        <td class="id-cell" title="${it.id}">${it.id}</td>
        <td class="name-cell">${it.name}</td>
        <td><span class="cat-badge">${it.category || '-'}</span></td>
        <td><span class="effect-badge">${it.effect || '-'}</span></td>
        <td class="num-cell">${it.value !== undefined ? it.value : '-'}</td>
        <td class="num-cell" style="color:#88ccaa">${it.appearsFrom !== undefined ? it.appearsFrom + 'F' : '-'}</td>
        <td class="price-cell">${it.shopPrice !== undefined ? it.shopPrice + 'G' : '-'}</td>
        <td class="num-cell" style="color:#aaa">${it.dropWeight !== undefined ? it.dropWeight : '-'}</td>
        <td class="desc-cell">${it.description || ''}</td>
      </tr>`;
    }

    function renderWeaponRow(w) {
      const catClass = catBadgeClass(w.category);
      const durVal = w.durability === null ? '&#x221E;' : (w.durability !== undefined ? w.durability : '-');
      const atkVal = w.atk !== undefined ? w.atk : '-';
      const rangeVal = w.range !== undefined ? w.range : '-';
      return `<tr data-id="${w.id}" data-name="${w.name}" data-category="${w.category||''}" data-floor="${w.appearsFrom||0}">
        <td class="id-cell" title="${w.id}">${w.id}</td>
        <td class="name-cell">${w.name}</td>
        <td><span class="cat-badge ${catClass}">${w.category || '-'}</span></td>
        <td class="num-cell" style="color:#ff9999">${atkVal}</td>
        <td class="num-cell">${rangeVal}</td>
        <td style="font-size:0.75rem;color:#ccaaff">${w.attackPattern || '-'}<br><span style="color:#888;font-size:0.7rem">${w.rangeType || ''}</span></td>
        <td class="num-cell">${durVal}</td>
        <td class="num-cell" style="color:#ffcc88">${w.energyCost || 0}</td>
        <td class="num-cell" style="color:#88ccaa">${w.appearsFrom !== undefined ? w.appearsFrom + 'F' : '-'}</td>
        <td>${w.special ? `<span class="special-tag">${w.special}</span>` : '-'}</td>
        <td class="desc-cell">${w.description || ''}</td>
      </tr>`;
    }

    function renderToolRow(t) {
      const passiveBadge = t.passive ? '<span class="passive-badge">パッシブ</span>' : '';
      return `<tr data-id="${t.id}" data-name="${t.name}" data-category="${t.category||''}" data-floor="${t.appearsFrom||0}">
        <td class="id-cell" title="${t.id}">${t.id}</td>
        <td class="name-cell">${t.name}${passiveBadge}</td>
        <td><span class="cat-badge">${t.category || '-'}</span></td>
        <td><span class="effect-badge">${t.effect || '-'}</span></td>
        <td class="num-cell">${t.value !== undefined ? t.value : '-'}</td>
        <td class="num-cell" style="color:#88ccaa">${t.appearsFrom !== undefined ? t.appearsFrom + 'F' : '-'}</td>
        <td class="price-cell">${t.shopPrice !== undefined ? t.shopPrice + 'G' : '-'}</td>
        <td style="text-align:center">${t.passive ? '<span style="color:#88ff88">&#x2714;</span>' : '<span style="color:#666">-</span>'}</td>
        <td class="desc-cell">${t.description || ''}</td>
      </tr>`;
    }

    function getCurrentData() {
      return { items: allItems, weapons: allWeapons, tools: allTools }[currentTab];
    }

    function getCurrentTbodyId() {
      return { items: 'items-tbody', weapons: 'weapons-tbody', tools: 'tools-tbody' }[currentTab];
    }

    function applyFilters() {
      const nameQ = document.getElementById('filter-name').value.toLowerCase();
      const catQ = document.getElementById('filter-category').value;
      const floorQ = parseInt(document.getElementById('filter-floor').value);
      const isFloor = !isNaN(floorQ);

      const tbodyId = getCurrentTbodyId();
      const rows = document.querySelectorAll(`#${tbodyId} tr`);
      let visible = 0;
      rows.forEach(tr => {
        const id = tr.dataset.id?.toLowerCase() || '';
        const name = tr.dataset.name?.toLowerCase() || '';
        const cat = tr.dataset.category || '';
        const floor = parseInt(tr.dataset.floor) || 0;

        let show = true;
        if (nameQ && !id.includes(nameQ) && !name.includes(nameQ)) show = false;
        if (catQ && cat !== catQ) show = false;
        if (isFloor && floor > floorQ) show = false;

        tr.classList.toggle('hidden', !show);
        if (show) visible++;
      });

      const total = getCurrentData().length;
      document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
      document.getElementById('stats').textContent = `表示: ${visible} / ${total} 件`;
    }

    function updateCategoryFilter() {
      const data = getCurrentData();
      const cats = [...new Set(data.map(d => d.category).filter(Boolean))].sort();
      const sel = document.getElementById('filter-category');
      const prev = sel.value;
      sel.innerHTML = '<option value="">全て</option>';
      cats.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
      });
      if (cats.includes(prev)) sel.value = prev;
    }

    function sortTable(tableKey, key) {
      const state = sortStates[tableKey];
      if (state.key === key) state.asc = !state.asc;
      else { state.key = key; state.asc = true; }

      document.querySelectorAll(`#tab-${tableKey} thead th`).forEach(th => {
        th.classList.remove('sorted');
        const icon = th.querySelector('.sort-icon');
        if (icon) icon.textContent = '\u25B2';
      });
      const activeTh = document.querySelector(`#tab-${tableKey} thead th[data-sort="${key}"]`);
      if (activeTh) {
        activeTh.classList.add('sorted');
        const icon = activeTh.querySelector('.sort-icon');
        if (icon) icon.textContent = state.asc ? '\u25B2' : '\u25BC';
      }

      const data = { items: allItems, weapons: allWeapons, tools: allTools }[tableKey];
      const tbodyId = `${tableKey}-tbody`;
      const tbody = document.getElementById(tbodyId);
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const aD = data.find(d => d.id === a.querySelector('.id-cell')?.title);
        const bD = data.find(d => d.id === b.querySelector('.id-cell')?.title);
        if (!aD || !bD) return 0;
        let av = aD[key], bv = bD[key];
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
        av = av ?? -Infinity;
        bv = bv ?? -Infinity;
        if (av < bv) return state.asc ? -1 : 1;
        if (av > bv) return state.asc ? 1 : -1;
        return 0;
      });
      rows.forEach(r => tbody.appendChild(r));
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('.table-wrap').forEach(w => w.classList.toggle('active', w.id === `tab-${tab}`));
      updateCategoryFilter();
      applyFilters();
    }

    function init() {
      allItems   = ITEMS_DATA;
      allWeapons = WEAPONS_DATA;
      allTools   = TOOLS_DATA;

      document.getElementById('items-tbody').innerHTML = allItems.map(renderItemRow).join('');
      document.getElementById('weapons-tbody').innerHTML = allWeapons.map(renderWeaponRow).join('');
      document.getElementById('tools-tbody').innerHTML = allTools.map(renderToolRow).join('');

      document.getElementById('badge-items').textContent = allItems.length;
      document.getElementById('badge-weapons').textContent = allWeapons.length;
      document.getElementById('badge-tools').textContent = allTools.length;

      document.getElementById('loading').style.display = 'none';

      updateCategoryFilter();
      applyFilters();

      // Tab switching
      document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => switchTab(t.dataset.tab));
      });

      // Filters
      ['filter-name', 'filter-category', 'filter-floor'].forEach(id => {
        document.getElementById(id).addEventListener('input', applyFilters);
      });
      document.getElementById('btn-reset').addEventListener('click', () => {
        document.getElementById('filter-name').value = '';
        document.getElementById('filter-category').value = '';
        document.getElementById('filter-floor').value = '';
        applyFilters();
      });

      // Sort headers
      document.querySelectorAll('thead th[data-sort][data-table]').forEach(th => {
        th.addEventListener('click', () => {
          sortTable(th.dataset.table, th.dataset.sort);
          applyFilters();
        });
      });
    }

    init();
  </script>
</body>
</html>
